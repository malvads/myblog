{{ define "main" }}
<h2>Latest Updates</h2>
<table style="width: 100%; max-width: 600px; margin: 0 auto; border-collapse: collapse; text-align: center;">
    <thead>
        <tr style="border-bottom: 2px solid #000;">
            <th style="padding: 5px; width: 30%;">Date</th>
            <th style="padding: 5px;">Title</th>
        </tr>
    </thead>
    <tbody>
        {{ range (where .Site.RegularPages "Type" "in" .Site.Params.mainsections).ByDate.Reverse | first 10 }}
        <tr>
            <td style="padding: 5px;">{{ .Date.Format "2006-01-02" }}</td>
            <td style="padding: 5px;"><a href="{{ .Permalink }}">{{ .Title }}</a></td>
        </tr>
        {{ end }}
    </tbody>
</table>
{{ end }}
