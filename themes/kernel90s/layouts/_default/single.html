{{ define "main" }}
<h1>{{ .Title }}</h1>
{{ if .Date }}
<div class="post-meta">
    Date: {{ .Date.Format "2006-01-02" }}
    {{ if .Params.tags }}
    | Tags:
    {{ range .Params.tags }}
    <a href="{{ " /tags/" | relURL }}{{ . | urlize }}" style="text-decoration:none">[{{ . }}]</a>
    {{ end }}
    {{ end }}
</div>
{{ end }}

<div class="content">
    {{ .Content }}
</div>

<hr>
<a href="{{ .Site.BaseURL | relURL }}">&lt;&lt; Back home</a>
{{ end }}
