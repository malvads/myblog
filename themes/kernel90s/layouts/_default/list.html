{{ define "main" }}
<h1>{{ .Title }}</h1>
<div style="margin-top: 30px;">
    <ul style="list-style-type: none; padding: 0;">
        {{ range .Pages }}
        <li style="margin-bottom: 20px; border-bottom: 1px solid #f0f0f0; padding-bottom: 10px;">
            <div style="font-size: 0.85em; color: #666;">{{ if .Date }}{{ .Date.Format "2006-01-02" }}{{ end }}</div>
            <a href="{{ .Permalink }}"
                style="font-size: 1.1em; font-weight: bold; text-decoration: none; color: #000;">> {{ .Title }}</a>
        </li>
        {{ end }}
    </ul>
</div>
{{ end }}
