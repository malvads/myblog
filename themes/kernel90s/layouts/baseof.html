<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 18px;
      line-height: 1.6;
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #header {
      background-color: #ffffff;
      padding: 30px 15px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      max-width: 800px;
      width: 90%;
      margin: 0 auto;
      border-bottom: 2px solid #000;
    }

    #logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    #logo a {
      color: #000;
      text-decoration: none;
    }

    #menu {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    #menu a {
      text-decoration: none;
      color: #000000;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid transparent;
    }

    #menu a:hover {
      border-bottom: 1px solid #000;
    }

    #content {
      padding: 40px 15px;
      max-width: 800px;
      width: 90%;
      text-align: left;
      box-sizing: border-box;
    }

    a {
      color: #0000ee;
      text-decoration: underline;
    }

    a:visited {
      color: #551a8b;
    }

    h1,
    h2,
    h3 {
      font-weight: bold;
      margin-top: 40px;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    h1 {
      font-size: 1.5em;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    h2 {
      font-size: 1.3em;
    }

    h3 {
      font-size: 1.1em;
    }

    hr {
      border: 0;
      border-top: 1px solid #eee;
      margin: 40px 0;
    }

    .post-meta {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    .footer {
      margin-top: 60px;
      margin-bottom: 40px;
      padding: 20px;
      font-size: 0.8em;
      text-align: center;
      color: #666;
      width: 100%;
      border-top: 1px solid #eee;
    }

    pre {
      background-color: #f6f8fa;
      border: 1px solid #ddd;
      padding: 16px;
      overflow-x: auto;
      text-align: left;
      font-size: 16px;
      border-radius: 6px;
      margin: 20px 0;
    }

    code {
      font-family: inherit;
      background-color: #f6f8fa;
      padding: 2px 4px;
      border-radius: 3px;
    }

    pre code {
      background-color: transparent;
      padding: 0;
    }

    blockquote {
      border-left: 4px solid #ddd;
      margin: 20px 0;
      padding: 10px 20px;
      color: #666;
      font-style: italic;
    }

    /* Figure styling for centering and size consistency */
    figure {
      margin: 40px auto;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
    }

    figure img {
      max-width: 100%;
      height: auto;
      max-height: 500px;
      border: 1px solid #eee;
      display: block;
      margin: 0 auto;
    }

    figcaption {
      margin-top: 15px;
      font-size: 0.8em;
      color: #666;
      font-style: italic;
    }

    /* Responsive adjustments for phones */
    @media (max-width: 768px) {
      body {
        font-size: 18px;
      }

      #header {
        width: 95%;
        padding: 20px 10px;
        align-items: center;
      }

      #logo {
        font-size: 22px;
        text-align: center;
      }

      #menu {
        justify-content: center;
      }

      #content {
        padding: 20px 10px;
        width: 95%;
      }

      pre {
        font-size: 14px;
        margin: 20px 0;
      }
    }
  </style>
</head>

<body>

  <div id="header">
    <div id="logo">
      <a href="{{ " /" | relLangURL }}">{{ .Site.Title }}</a>
    </div>
    <div
      style="display: flex; justify-content: space-between; width: 100%; align-items: center; flex-wrap: wrap; gap: 20px;">
      <nav id="menu">
        {{ range .Site.Menus.main }}
        <a href="{{ .URL | relURL }}">{{ .Name }}</a>
        {{ end }}
      </nav>

      <div id="language-switcher">
        <select onchange="localStorage.setItem('pref-lang', this.value); window.location.href=this.value"
          style="font-family: inherit; font-size: 14px; font-weight: bold; border: 2px solid #000; padding: 5px 10px; background: #fff; cursor: pointer; outline: none;">
          {{ $currentLang := .Language.Lang }}
          {{ range .Site.Languages }}
          {{ $lang := .Lang }}
          {{ $url := "/" }}
          {{ if ne $lang $.Site.Language.Lang }}
          {{ $url = printf "/%s/" $lang }}
          {{ end }}
          {{ $.Scratch.Set "langlink" ($url | relURL) }}
          {{ range $.AllTranslations }}
          {{ if eq .Language.Lang $lang }}
          {{ $.Scratch.Set "langlink" .Permalink }}
          {{ end }}
          {{ end }}
          <option value="{{ $.Scratch.Get " langlink" }}" {{ if eq $currentLang $lang }}selected{{ end }}>
            {{ .LanguageName }}
          </option>
          {{ end }}
        </select>
      </div>
    </div>
  </div>

  <script>
    (function () {
      const prefLang = localStorage.getItem('pref-lang');
      const currentPath = window.location.pathname;
      const isRoot = currentPath === '/' || currentPath === '/index.html' || currentPath === '/es/' || currentPath === '/es/index.html';

      if (isRoot && prefLang) {
        const prefUrl = new URL(prefLang);
        if (prefUrl.pathname !== currentPath && prefUrl.pathname !== currentPath + 'index.html') {
          if (window.location.href !== prefLang) {
            window.location.href = prefLang;
          }
        }
      }
    })();
  </script>

  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    &copy; {{ now.Year }} {{ .Site.Params.author }}
  </footer>

</body>

</html>
