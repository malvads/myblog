<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <style>
    body {
      font-family: 'Courier New', Courier, monospace;
      font-size: 22px;
      line-height: 1.6;
      background-color: #0c0c0c;
      color: #00ff00;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #header {
      background-color: #000000;
      border: 1px solid #00ff00;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 1000px;
      width: 95%;
      margin: 20px auto;
      box-shadow: 0 0 10px #00ff00;
    }

    #logo {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #menu {
      margin-top: 10px;
    }

    #menu a {
      text-decoration: none;
      color: #00ff00;
      background: transparent;
      border: none;
      padding: 5px 20px;
      font-size: 24px;
      font-weight: bold;
      text-transform: uppercase;
    }

    #menu a:hover {
      background: #004400;
      color: #ffffff;
    }

    #content {
      padding: 40px 20px;
      max-width: 900px;
      width: 100%;
      text-align: left;
      /* Style Medium - Left aligned content */
      font-size: 22px;
      box-sizing: border-box;
    }

    a {
      color: #00ff00;
      text-decoration: underline;
    }

    a:visited {
      color: #00aa00;
    }

    h1,
    h2,
    h3 {
      border-bottom: 2px solid #00ff00;
      padding-bottom: 10px;
      margin-top: 40px;
      text-shadow: 0 0 8px #00ff00;
      text-transform: uppercase;
    }

    hr {
      border: 0;
      border-top: 1px solid #00ff00;
    }

    .post-meta {
      color: #00aa00;
      font-size: 0.9em;
      margin-bottom: 10px;
    }

    .footer {
      margin-top: 40px;
      border-top: 1px solid #00ff00;
      padding: 10px 20px;
      font-size: 0.8em;
      text-align: center;
    }

    pre {
      background-color: #111111;
      border: 1px solid #00ff00;
      padding: 20px;
      overflow-x: auto;
      text-align: left;
      font-size: 20px;
      border-radius: 5px;
      box-shadow: inset 0 0 10px #000000;
    }

    blockquote {
      border-left: 3px solid #00ff00;
      margin-left: 0;
      padding-left: 10px;
      color: #00cc00;
      font-style: italic;
    }

    /* Responsive adjustments for phones */
    @media (max-width: 768px) {
      body {
        font-size: 18px;
      }

      #header {
        width: 100%;
        margin: 0;
        border-left: none;
        border-right: none;
        padding: 20px 10px;
      }

      #logo {
        font-size: 24px;
      }

      #menu a {
        font-size: 18px;
        padding: 5px 10px;
      }

      #content {
        font-size: 18px;
        padding: 20px 15px;
      }

      pre {
        font-size: 14px;
        padding: 10px;
        margin: 20px -15px;
        border-radius: 0;
      }

      h1,
      h2,
      h3 {
        font-size: 1.3em;
      }
    }
  </style>
</head>

<body>

  <div id="header">
    <div id="logo">
      <a href="{{ .Site.BaseURL | relURL }}"
        style="color: #00ff00; text-decoration: none; text-shadow: 0 0 10px #00ff00;">{{ .Site.Title }}</a>
    </div>
    <div id="menu">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </div>
  </div>

  <div id="content">
    {{ block "main" . }}{{ end }}
  </div>

  <div class="footer">
    &copy; {{ now.Year }} {{ .Site.Params.author }}
  </div>

</body>

</html>
