<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <style>
    body {
      font-family: monospace, Courier, "Courier New";
      font-size: 24px;
      line-height: 1.6;
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      padding: 1% 2%;
      text-align: center;
    }

    #header {
      background-color: #ffffff;
      border: 1px solid #000;
      padding: 15px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
    }

    #logo {
      font-size: 36px;
      font-weight: bold;
      margin-bottom: 10px;
    }

    #menu {
      margin-top: 10px;
    }

    #menu a {
      text-decoration: none;
      color: #000000;
      background: transparent;
      border: none;
      padding: 5px 20px;
      font-size: 24px;
      font-weight: bold;
    }

    #menu a:hover {
      background: #aaa;
    }

    #content {
      padding: 20px;
      max-width: 1200px;
      width: 100%;
      margin: 0 auto;
      text-align: center;
      font-size: 24px;
    }

    a {
      color: #000000;
      text-decoration: underline;
    }

    a:visited {
      color: #000000;
    }

    h1,
    h2,
    h3 {
      border-bottom: 1px solid #ccc;
      padding-bottom: 5px;
    }

    hr {
      border: 0;
      border-top: 1px solid #ccc;
    }

    .post-meta {
      color: #555;
      font-size: 0.9em;
      margin-bottom: 10px;
    }

    .footer {
      margin-top: 40px;
      border-top: 1px solid #000;
      padding: 10px 20px;
      font-size: 0.8em;
      text-align: center;
    }

    pre {
      background-color: #272822;
      /* Matches monokai or dracula backgrounds */
      border: 1px solid #999;
      padding: 20px;
      overflow-x: auto;
      text-align: left;
      font-size: 20px;
      border-radius: 5px;
    }

    blockquote {
      border-left: 3px solid #ccc;
      margin-left: 0;
      padding-left: 10px;
      color: #444;
      font-style: italic;
    }

    /* Responsive adjustments for phones */
    @media (max-width: 768px) {
      body {
        font-size: 18px;
        padding: 5px;
      }

      #header {
        padding: 10px;
      }

      #logo {
        font-size: 24px;
      }

      #menu {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
      }

      #menu a {
        font-size: 18px;
        padding: 5px 10px;
      }

      #content {
        font-size: 18px;
        padding: 10px;
      }

      pre {
        font-size: 15px;
        padding: 10px;
      }
    }
  </style>
</head>

<body>

  <div id="header">
    <div id="logo">
      <a href="{{ .Site.BaseURL | relURL }}" style="color: black; text-decoration: none;">{{ .Site.Title }}</a>
    </div>
    <div id="menu">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </div>
  </div>

  <div id="content">
    {{ block "main" . }}{{ end }}
  </div>

  <div class="footer">
    &copy; {{ now.Year }} {{ .Site.Params.author }}
  </div>

</body>

</html>
