<!DOCTYPE html>
<html lang="{{ .Language.Lang }}">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} - {{ .Site.Title }}{{ end }}</title>
  <style>
    body {
      font-family: ui-monospace, Menlo, Monaco, "Cascadia Mono", "Segoe UI Mono", "Roboto Mono", "Oxygen Mono", "Ubuntu Monospace", "Source Code Pro", "Fira Mono", "Droid Sans Mono", "Courier New", monospace;
      font-size: 20px;
      line-height: 1.6;
      background-color: #ffffff;
      color: #000000;
      margin: 0;
      padding: 0;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #header {
      background-color: #ffffff;
      padding: 30px 15px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      justify-content: center;
      max-width: 800px;
      width: 90%;
      margin: 0 auto;
      border-bottom: 2px solid #000;
    }

    #logo {
      font-size: 28px;
      font-weight: bold;
      margin-bottom: 15px;
    }

    #logo a {
      color: #000;
      text-decoration: none;
    }

    #menu {
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
    }

    #menu a {
      text-decoration: none;
      color: #000000;
      font-size: 18px;
      font-weight: bold;
      border-bottom: 1px solid transparent;
    }

    #menu a:hover {
      border-bottom: 1px solid #000;
    }

    #content {
      padding: 40px 15px;
      max-width: 800px;
      width: 90%;
      text-align: left;
      box-sizing: border-box;
    }

    a {
      color: #0000ee;
      text-decoration: underline;
    }

    a:visited {
      color: #551a8b;
    }

    h1,
    h2,
    h3 {
      font-weight: bold;
      margin-top: 40px;
      margin-bottom: 20px;
      line-height: 1.2;
    }

    h1 {
      font-size: 1.5em;
      border-bottom: 1px solid #eee;
      padding-bottom: 10px;
    }

    h2 {
      font-size: 1.3em;
    }

    h3 {
      font-size: 1.1em;
    }

    hr {
      border: 0;
      border-top: 1px solid #eee;
      margin: 40px 0;
    }

    .post-meta {
      color: #666;
      font-size: 0.9em;
      margin-bottom: 20px;
    }

    .footer {
      margin-top: 60px;
      margin-bottom: 40px;
      padding: 20px;
      font-size: 0.8em;
      text-align: center;
      color: #666;
      width: 100%;
      border-top: 1px solid #eee;
    }

    pre {
      background-color: #f6f8fa;
      border: 1px solid #ddd;
      padding: 16px;
      overflow-x: auto;
      text-align: left;
      font-size: 16px;
      border-radius: 6px;
      margin: 20px 0;
    }

    code {
      font-family: inherit;
      background-color: #f6f8fa;
      padding: 2px 4px;
      border-radius: 3px;
    }

    pre code {
      background-color: transparent;
      padding: 0;
    }

    blockquote {
      border-left: 4px solid #ddd;
      margin: 20px 0;
      padding: 10px 20px;
      color: #666;
      font-style: italic;
    }

    /* Responsive adjustments for phones */
    @media (max-width: 768px) {
      body {
        font-size: 18px;
      }

      #header {
        width: 95%;
        padding: 20px 10px;
        align-items: center;
      }

      #logo {
        font-size: 22px;
        text-align: center;
      }

      #menu {
        justify-content: center;
      }

      #content {
        padding: 20px 10px;
        width: 95%;
      }

      pre {
        font-size: 14px;
        margin: 20px 0;
      }
    }
  </style>
</head>

<body>

  <div id="header">
    <div id="logo">
      <a href="{{ .Site.BaseURL | relURL }}">{{ .Site.Title }}</a>
    </div>
    <nav id="menu">
      {{ range .Site.Menus.main }}
      <a href="{{ .URL | relURL }}">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>

  <main id="content">
    {{ block "main" . }}{{ end }}
  </main>

  <footer class="footer">
    &copy; {{ now.Year }} {{ .Site.Params.author }}
  </footer>

</body>

</html>
